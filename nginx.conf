server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;
    charset utf-8;

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }

    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /audio/ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
    }
}
